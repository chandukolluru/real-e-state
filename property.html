<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Details | Hyderabad Realty</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .property-detail {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 2rem;
    }
    .property-detail img {
      width: 100%;
      border-radius: 12px;
      object-fit: cover;
    }
    .property-info h1 {
      margin-top: 0;
    }
    .back-link {
      margin: 1rem auto;
      display: block;
      max-width: 1100px;
      color: #ff9800;
    }
  </style>
</head>
<body>
  <header>
    <div class="container header-container">
      <div class="logo">Hyderabad Realty</div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="properties.html">Properties</a></li>
          <li><a href="blogs.html">Blogs</a></li>
          <li><a href="account.html">My Account</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <a class="back-link" href="properties.html">← Back to Properties</a>

  <section id="property" class="property-detail"></section>

  <footer>
    <div class="container footer-container">
      <p>&copy; 2024 Hyderabad Realty. All rights reserved.</p>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="properties.html">Properties</a></li>
          <li><a href="blogs.html">Blogs</a></li>
          <li><a href="account.html">My Account</a></li>
        </ul>
      </nav>
    </div>
  </footer>

  <script>
    function qs(key) {
      return new URLSearchParams(window.location.search).get(key);
    }

    async function loadProperty() {
      const id = qs('id');
      if (!id) return;
      try {
        const res = await fetch(`/api/properties/${id}`);
        const data = await res.json();
        const container = document.getElementById('property');
        container.innerHTML = `
          <img src="${data.image}" alt="${data.title}">
          <div class="property-info">
            <h1>${data.title}</h1>
            <p><strong>Purpose:</strong> ${data.purpose}</p>
            <p><strong>Price:</strong> ₹${new Intl.NumberFormat().format(data.price)}</p>
            <p><strong>Area:</strong> ${data.area} sq.ft.</p>
            <p><strong>Bedrooms:</strong> ${data.bedrooms}</p>
            <p><strong>Bathrooms:</strong> ${data.bathrooms}</p>
            <p><strong>Location:</strong> ${data.location}</p>
          </div>
        `;
      } catch (err) {
        console.error(err);
      }
    }
    loadProperty();
  </script>
</body>
</html>
